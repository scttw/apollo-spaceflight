<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saturn V — Apollo</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body data-page="saturn-v">
  <canvas id="scene"></canvas>

  <main id="content">
    <section class="panel">
      <div class="caption">
        <span class="caption-index">01</span>
        <span class="caption-text">Saturn V — Launch Complex 39</span>
      </div>
      <div class="well">
        <h2 class="well-title">The vehicle that left the planet</h2>
        <p>A text description of the Saturn V goes here. Replace this placeholder
        with the real copy — the stack, the stages, the launch complex.</p>
        <p class="hint">Drag to orbit · drag up / down to zoom</p>
      </div>
    </section>
  </main>

  <script type="module">
    import { mountScene } from './scene.js';
    import { SCENES } from './scenes.js';
    mountScene(document.getElementById('scene'), SCENES['saturn-v']);
  </script>
  <script type="module" src="./chrome.js"></script>
</body>
</html>
