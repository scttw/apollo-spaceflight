<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Apollo</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body data-page="gallery">
  <canvas id="scene"></canvas>

  <main id="content" class="scroll-page">
    <div class="well well-wide">
      <h1 class="page-title">Gallery</h1>
      <p>Renders of the models, exported from Blender. Click any image to view it
      full size; use the arrow keys or the on-screen controls to step through.</p>
    </div>

    <div class="gallery-grid" id="grid"></div>
  </main>

  <script type="module">
    import { mountScene } from './scene.js';
    mountScene(document.getElementById('scene'), null); // stars only
  </script>
  <script type="module" src="./gallery.js"></script>
  <script type="module" src="./chrome.js"></script>
</body>
</html>
